<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 pb-20">
    <div class="bg-orange-600 text-white p-4 sticky top-0 flex items-center shadow-md">
        <a href="index.html" class="mr-4"><i class="fa-solid fa-arrow-left text-xl"></i></a>
        <h1 class="text-xl font-bold">Global Settings</h1>
    </div>

    <div class="p-4">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
            <h2 class="font-bold text-gray-800 mb-4"><i class="fa-solid fa-qrcode text-orange-500 mr-2"></i>Payment QR Setup</h2>
            
            <div class="mb-4">
                <label class="block text-xs font-bold text-gray-500 mb-1">Current QR Code</label>
                <img id="current-qr" src="https://via.placeholder.com/150?text=No+QR+Set" class="w-32 h-32 border-2 border-dashed border-gray-300 rounded-lg object-contain">
            </div>

            <input type="file" id="qr-upload" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100 mb-4">
            
            <button id="save-qr-btn" class="w-full bg-orange-500 text-white font-bold py-2 rounded-lg shadow hover:bg-orange-600">
                Upload & Save
            </button>
        </div>
    </div>

    <script type="module">
        import { db, storage, doc, getDoc, setDoc, ref, uploadBytes, getDownloadURL } from '../common/firebase-config.js';

        const qrImg = document.getElementById('current-qr');
        const uploadInput = document.getElementById('qr-upload');
        const saveBtn = document.getElementById('save-qr-btn');

        // Load existing QR
        async function loadQR() {
            const docSnap = await getDoc(doc(db, "settings", "global"));
            if(docSnap.exists() && docSnap.data().upi_qr_code_image_url) {
                qrImg.src = docSnap.data().upi_qr_code_image_url;
            }
        }
        loadQR();

        saveBtn.addEventListener('click', async () => {
            const file = uploadInput.files[0];
            if(!file) return alert("Select an image first!");
            
            saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Uploading...';
            
            try {
                // Upload to Storage
                const storageRef = ref(storage, 'settings/payment_qr.jpg');
                await uploadBytes(storageRef, file);
                const url = await getDownloadURL(storageRef);
                
                // Save to Firestore
                await setDoc(doc(db, "settings", "global"), { upi_qr_code_image_url: url }, { merge: true });
                
                qrImg.src = url;
                alert("Payment QR Updated successfully!");
            } catch (e) {
                alert("Error: " + e.message);
            } finally {
                saveBtn.innerHTML = 'Upload & Save';
            }
        });
    </script>
</body>
</html>
