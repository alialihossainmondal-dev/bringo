<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 select-none pb-20">
    <div class="bg-orange-600 text-white p-4 sticky top-0 flex items-center shadow-md z-40">
        <a href="index.html" class="mr-4"><i class="fa-solid fa-arrow-left text-xl"></i></a>
        <h1 class="text-xl font-bold">Order Management</h1>
    </div>

    <div class="p-4">
        <!-- Filter Tabs -->
        <div class="flex gap-2 mb-4 overflow-x-auto no-scrollbar">
            <button class="bg-orange-500 text-white px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap">All</button>
            <button class="bg-white text-gray-600 border border-gray-200 px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap hover:bg-orange-50">Pending Verification</button>
        </div>

        <div id="admin-orders" class="space-y-3">
            <div class="text-center text-sm text-gray-500 py-10"><i class="fa-solid fa-spinner fa-spin text-2xl"></i></div>
        </div>
    </div>

    <script type="module">
        import { db, collection, getDocs } from '../common/firebase-config.js';

        async function loadAdminOrders() {
            const list = document.getElementById('admin-orders');
            const querySnapshot = await getDocs(collection(db, "orders"));
            list.innerHTML = '';
            
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                
                // Highlight logic for Prepaid orders that are newly placed
                let isPendingPrepaid = (data.payment_method === 'prepaid' && data.status === 'Placed');
                let cardStyle = isPendingPrepaid ? 'border-orange-500 bg-orange-50' : 'border-gray-200 bg-white';
                let alertIcon = isPendingPrepaid ? '<i class="fa-solid fa-triangle-exclamation text-orange-500 ml-2 animate-pulse"></i>' : '';

                list.innerHTML += `
                    <div class="p-3 rounded-xl shadow-sm border-l-4 ${cardStyle} relative">
                        <div class="flex justify-between items-start mb-2 border-b border-gray-100 pb-2">
                            <div>
                                <span class="text-xs font-bold text-gray-500">#${docSnap.id.slice(-6).toUpperCase()}</span>
                                ${alertIcon}
                            </div>
                            <span class="text-[10px] font-bold text-gray-700 bg-gray-100 px-2 py-0.5 rounded">${data.status}</span>
                        </div>
                        
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-sm font-bold text-gray-800">₹${data.total_amount}</p>
                                <p class="text-[10px] text-gray-500 uppercase font-bold mt-1">
                                    ${data.payment_method === 'prepaid' ? `<span class="text-orange-600">PREPAID</span> | TXN: ${data.transaction_id}` : 'COD'}
                                </p>
                            </div>
                            <a href="order_detail.html?id=${docSnap.id}" class="w-8 h-8 bg-orange-500 text-white rounded-full flex items-center justify-center shadow hover:bg-orange-600">
                                <i class="fa-solid fa-chevron-right text-xs"></i>
                            </a>
                        </div>
                    </div>`;
            });
        }
        loadAdminOrders();
    </script>
</body>
</html>
