<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bringo Admin - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 select-none pb-20">
    <!-- Admin Header -->
    <div class="bg-orange-600 text-white p-4 sticky top-0 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold"><i class="fa-solid fa-shield-halved text-yellow-300"></i> Bringo Admin</h1>
        <a href="setting.html"><i class="fa-solid fa-gear text-xl"></i></a>
    </div>

    <div class="p-4">
        <!-- Stats Grid -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-yellow-400">
                <p class="text-xs text-gray-500 font-bold uppercase">Total Revenue</p>
                <h3 id="total-revenue" class="text-xl font-bold text-orange-600 mt-1"><i class="fa-solid fa-spinner fa-spin text-sm"></i></h3>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-orange-500">
                <p class="text-xs text-gray-500 font-bold uppercase">Orders</p>
                <h3 id="total-orders" class="text-xl font-bold text-gray-800 mt-1"><i class="fa-solid fa-spinner fa-spin text-sm"></i></h3>
            </div>
        </div>

        <!-- Quick Actions -->
        <h2 class="font-bold text-gray-700 mb-3 uppercase text-sm">Management</h2>
        <div class="grid grid-cols-3 gap-2 text-center mb-6">
            <a href="banner.html" class="bg-white p-3 rounded-xl shadow-sm flex flex-col items-center hover:bg-orange-50 transition">
                <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center mb-1"><i class="fa-solid fa-images text-orange-500"></i></div>
                <span class="text-[10px] font-bold text-gray-600 uppercase">Banners</span>
            </a>
            <a href="product.html" class="bg-white p-3 rounded-xl shadow-sm flex flex-col items-center hover:bg-orange-50 transition">
                <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center mb-1"><i class="fa-solid fa-box text-orange-500"></i></div>
                <span class="text-[10px] font-bold text-gray-600 uppercase">Products</span>
            </a>
            <a href="category.html" class="bg-white p-3 rounded-xl shadow-sm flex flex-col items-center hover:bg-orange-50 transition">
                <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center mb-1"><i class="fa-solid fa-list text-orange-500"></i></div>
                <span class="text-[10px] font-bold text-gray-600 uppercase">Categories</span>
            </a>
            <a href="order.html" class="bg-white p-3 rounded-xl shadow-sm flex flex-col items-center hover:bg-orange-50 transition">
                <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center mb-1"><i class="fa-solid fa-truck text-orange-500"></i></div>
                <span class="text-[10px] font-bold text-gray-600 uppercase">Orders</span>
            </a>
            <a href="coupon.html" class="bg-white p-3 rounded-xl shadow-sm flex flex-col items-center hover:bg-orange-50 transition">
                <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center mb-1"><i class="fa-solid fa-ticket text-orange-500"></i></div>
                <span class="text-[10px] font-bold text-gray-600 uppercase">Coupons</span>
            </a>
            <a href="user.html" class="bg-white p-3 rounded-xl shadow-sm flex flex-col items-center hover:bg-orange-50 transition">
                <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center mb-1"><i class="fa-solid fa-users text-orange-500"></i></div>
                <span class="text-[10px] font-bold text-gray-600 uppercase">Users</span>
            </a>
        </div>

        <!-- Master Codes Management Section -->
        <h2 class="font-bold text-gray-700 mb-3 uppercase text-sm"><i class="fa-solid fa-shield-cat text-blue-500 mr-1"></i> Anti-Scam Master Codes</h2>
        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 border-t-4 border-blue-500">
            
            <!-- NEW: Amount Input for Anti-Scam -->
            <label class="text-[11px] font-bold text-gray-500 uppercase">Customer Order Amount (₹)</label>
            <div class="flex gap-2 mt-1 mb-4">
                <input type="number" id="master-code-amount" placeholder="e.g. 299" class="flex-1 border rounded-lg p-2 text-sm font-bold text-gray-800 focus:outline-none focus:border-blue-500">
                <button id="generate-code-btn" class="bg-blue-600 text-white font-bold py-2 px-4 rounded-lg shadow hover:bg-blue-700 transition flex justify-center items-center gap-2">
                    <i class="fa-solid fa-plus"></i> Generate
                </button>
            </div>
            
            <!-- Code Display Box -->
            <div id="generated-code-display" class="hidden bg-blue-50 border border-blue-200 p-3 rounded-lg text-center mb-4">
                <p class="text-[11px] text-blue-600 mb-1 font-bold">New Code Ready for <span id="display-amount" class="text-orange-600 text-sm"></span></p>
                <p id="new-code-text" class="text-xl font-black text-blue-700 tracking-widest select-all"></p>
            </div>

            <!-- Codes History Table -->
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead>
                        <tr class="border-b border-gray-200 text-gray-500">
                            <th class="pb-2 font-bold text-[10px] uppercase">Code</th>
                            <th class="pb-2 font-bold text-[10px] uppercase text-center">Amount</th>
                            <th class="pb-2 font-bold text-[10px] uppercase text-right">Status</th>
                        </tr>
                    </thead>
                    <tbody id="codes-table-body">
                        <tr><td colspan="3" class="text-center py-4 text-xs text-gray-400"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, collection, getDocs, addDoc } from '../common/firebase-config.js';

        async function fetchDashboardStats() {
            try {
                const querySnapshot = await getDocs(collection(db, "orders"));
                let totalRevenue = 0, totalOrders = 0;
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    totalOrders++;
                    if(data.status !== 'Cancelled') totalRevenue += Number(data.total_amount || 0);
                });
                document.getElementById('total-revenue').innerText = `₹${totalRevenue}`;
                document.getElementById('total-orders').innerText = totalOrders;
            } catch (error) {
                console.error("Error fetching stats:", error);
            }
        }

        async function loadMasterCodes() {
            const tbody = document.getElementById('codes-table-body');
            try {
                const querySnapshot = await getDocs(collection(db, "master_codes"));
                let codes = [];
                querySnapshot.forEach(doc => codes.push({ id: doc.id, ...doc.data() }));
                codes.sort((a, b) => b.created_at.toMillis() - a.created_at.toMillis());

                tbody.innerHTML = '';
                if (codes.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="text-center py-4 text-xs text-gray-500">No codes generated yet.</td></tr>';
                    return;
                }

                codes.forEach(code => {
                    const statusHtml = code.is_used 
                        ? `<span class="text-red-500 font-bold"><i class="fa-solid fa-lock"></i> Used</span>` 
                        : `<span class="text-green-500 font-bold"><i class="fa-solid fa-lock-open"></i> Live</span>`;
                    
                    const amountHtml = `₹${code.amount || 0}`;

                    tbody.innerHTML += `
                        <tr class="border-b border-gray-100 hover:bg-gray-50">
                            <td class="py-3 font-bold text-gray-800 tracking-wider select-all text-xs">${code.code}</td>
                            <td class="py-3 text-center font-black text-orange-600 text-xs">${amountHtml}</td>
                            <td class="py-3 text-[10px] text-right">${statusHtml}</td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Error loading codes:", error);
            }
        }

        document.getElementById('generate-code-btn').addEventListener('click', async () => {
            const amountInput = document.getElementById('master-code-amount').value;
            const btn = document.getElementById('generate-code-btn');
            
            if(!amountInput || Number(amountInput) <= 0) {
                return alert("Please enter a valid order amount first!");
            }

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            btn.disabled = true;

            const randomNum = Math.floor(10000 + Math.random() * 90000);
            const newCode = "BB-" + randomNum;

            try {
                await addDoc(collection(db, "master_codes"), {
                    code: newCode,
                    amount: Number(amountInput), // NEW: টাকার পরিমাণ সেভ হচ্ছে
                    is_used: false,
                    created_at: new Date()
                });
                
                document.getElementById('generated-code-display').classList.remove('hidden');
                document.getElementById('new-code-text').innerText = newCode;
                document.getElementById('display-amount').innerText = `₹${amountInput}`;
                document.getElementById('master-code-amount').value = ''; // বক্স খালি করা
                
                btn.innerHTML = '<i class="fa-solid fa-plus"></i> Generate';
                btn.disabled = false;
                loadMasterCodes();

            } catch (error) {
                alert("Error generating code: " + error.message);
                btn.innerHTML = '<i class="fa-solid fa-plus"></i> Generate';
                btn.disabled = false;
            }
        });

        fetchDashboardStats();
        loadMasterCodes();
    </script>
</body>
</html>
