<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bringo Admin - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 select-none pb-20">
    <!-- Admin Header -->
    <div class="bg-orange-600 text-white p-4 sticky top-0 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold"><i class="fa-solid fa-shield-halved text-yellow-300"></i> Bringo Admin</h1>
        <a href="setting.html"><i class="fa-solid fa-gear text-xl"></i></a>
    </div>

    <div class="p-4">
        <!-- Stats Grid -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-yellow-400">
                <p class="text-xs text-gray-500 font-bold uppercase">Total Revenue</p>
                <h3 class="text-xl font-bold text-orange-600 mt-1">₹45,200</h3>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-orange-500">
                <p class="text-xs text-gray-500 font-bold uppercase">Orders</p>
                <h3 class="text-xl font-bold text-gray-800 mt-1">128</h3>
            </div>
        </div>

        <!-- Alerts Section -->
        <div class="bg-yellow-100 border-l-4 border-yellow-500 p-4 rounded-lg mb-6 shadow-sm">
            <div class="flex items-center">
                <i class="fa-solid fa-bell text-yellow-600 text-xl mr-3"></i>
                <div>
                    <h4 class="text-sm font-bold text-yellow-800">Pending Approvals</h4>
                    <p class="text-xs text-yellow-700">3 Prepaid orders await Transaction ID verification.</p>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <h2 class="font-bold text-gray-700 mb-3 uppercase text-sm">Management</h2>
        <div class="grid grid-cols-3 gap-3 text-center">
            <a href="product.html" class="bg-white p-4 rounded-xl shadow-sm flex flex-col items-center hover:bg-orange-50">
                <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center mb-2">
                    <i class="fa-solid fa-box text-orange-500"></i>
                </div>
                <span class="text-xs font-bold text-gray-600">Products</span>
            </a>
            <a href="category.html" class="bg-white p-4 rounded-xl shadow-sm flex flex-col items-center hover:bg-orange-50">
                <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center mb-2">
                    <i class="fa-solid fa-list text-orange-500"></i>
                </div>
                <span class="text-xs font-bold text-gray-600">Categories</span>
            </a>
            <a href="order.html" class="bg-white p-4 rounded-xl shadow-sm flex flex-col items-center hover:bg-orange-50">
                <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center mb-2">
                    <i class="fa-solid fa-truck text-orange-500"></i>
                </div>
                <span class="text-xs font-bold text-gray-600">Orders</span>
            </a>
        </div>
    </div>
</body>
</html>
