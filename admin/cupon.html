<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Coupons</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 select-none pb-20">
    <div class="bg-orange-600 text-white p-4 sticky top-0 flex items-center shadow-md z-40">
        <a href="index.html" class="mr-4"><i class="fa-solid fa-arrow-left text-xl"></i></a>
        <h1 class="text-xl font-bold">Manage Coupons</h1>
    </div>

    <div class="p-4">
        <!-- Add Coupon Form -->
        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 border-t-4 border-orange-500">
            <h2 class="font-bold text-gray-800 mb-3 uppercase text-sm"><i class="fa-solid fa-plus text-orange-500 mr-1"></i> Create New Promo Code</h2>
            
            <input type="text" id="c-code" placeholder="Coupon Code (e.g. EID50, NEWYEAR)" class="w-full border rounded-lg p-2 text-sm focus:outline-none focus:border-orange-500 mb-3 uppercase font-bold text-gray-700">
            
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase">Discount Amount (₹)</label>
                    <input type="number" id="c-discount" placeholder="e.g. 50" class="w-full border rounded-lg p-2 text-sm focus:outline-none focus:border-orange-500 mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase">Min Order Value (₹)</label>
                    <input type="number" id="c-min-order" placeholder="e.g. 500" class="w-full border rounded-lg p-2 text-sm focus:outline-none focus:border-orange-500 mt-1">
                </div>
            </div>
            
            <button id="add-btn" class="w-full bg-gray-800 text-white font-bold py-2 rounded-lg text-sm shadow hover:bg-black transition">Create Coupon</button>
        </div>

        <h2 class="font-bold text-gray-800 mb-3 uppercase text-sm">Active Coupons</h2>
        <div id="coupon-list" class="space-y-3">
            <div class="text-center text-sm text-gray-500"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>
        </div>
    </div>

    <script type="module">
        import { db, collection, addDoc, getDocs, doc, deleteDoc } from '../common/firebase-config.js';

        const loadCoupons = async () => {
            const list = document.getElementById('coupon-list');
            list.innerHTML = '';
            const querySnapshot = await getDocs(collection(db, "coupons"));
            
            if(querySnapshot.empty) {
                list.innerHTML = `<div class="text-center text-sm text-gray-400">No Active Coupons</div>`;
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                list.innerHTML += `
                    <div class="bg-white p-3 rounded-xl shadow-sm flex items-center justify-between border-l-4 border-green-500 relative">
                        <div>
                            <h3 class="font-black text-lg text-gray-800 tracking-wider">${data.code}</h3>
                            <p class="text-green-600 font-bold text-sm">₹${data.discount_amount} OFF</p>
                            <p class="text-[10px] text-gray-400 mt-1">Min Order: ₹${data.min_order_value}</p>
                        </div>
                        <button onclick="deleteCoupon('${docSnap.id}')" class="text-red-400 hover:text-red-600 p-2"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
            });
        };

        document.getElementById('add-btn').addEventListener('click', async () => {
            const code = document.getElementById('c-code').value.toUpperCase().trim();
            const discount = document.getElementById('c-discount').value;
            const minOrder = document.getElementById('c-min-order').value;
            const btn = document.getElementById('add-btn');
            
            if(!code || !discount || !minOrder) return alert("Please fill all fields.");
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating...';

            try {
                await addDoc(collection(db, "coupons"), { 
                    code: code,
                    discount_amount: Number(discount),
                    min_order_value: Number(minOrder),
                    created_at: new Date()
                });
                
                document.getElementById('c-code').value = '';
                document.getElementById('c-discount').value = '';
                document.getElementById('c-min-order').value = '';
                loadCoupons();
            } catch (error) {
                alert("Error: " + error.message);
            } finally {
                btn.innerHTML = 'Create Coupon';
            }
        });

        window.deleteCoupon = async (id) => {
            if(confirm('Delete this coupon?')) {
                await deleteDoc(doc(db, "coupons", id));
                loadCoupons();
            }
        };

        loadCoupons();
    </script>
</body>
</html>
