<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Banners</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 select-none pb-20">
    <div class="bg-orange-600 text-white p-4 sticky top-0 flex items-center shadow-md z-40">
        <a href="index.html" class="mr-4"><i class="fa-solid fa-arrow-left text-xl"></i></a>
        <h1 class="text-xl font-bold">Manage Banners</h1>
    </div>

    <div class="p-4">
        <div class="bg-white p-4 rounded-xl shadow-sm mb-6">
            <h2 class="font-bold text-gray-800 mb-1 uppercase text-sm"><i class="fa-solid fa-image text-orange-500 mr-1"></i> Add Slider Banner</h2>
            <p class="text-[10px] text-gray-500 mb-3">Upload wide banners (e.g. 16:9 ratio) for best appearance.</p>
            
            <input type="file" id="banner-image" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-orange-50 file:text-orange-700 mb-3">
            <button id="add-btn" class="w-full bg-orange-500 text-white font-bold py-2 rounded-lg text-sm shadow hover:bg-orange-600">Upload Banner</button>
        </div>

        <h2 class="font-bold text-gray-800 mb-3 uppercase text-sm">Active Banners</h2>
        <div id="banner-list" class="space-y-3">
            <div class="text-center text-sm text-gray-500"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>
        </div>
    </div>

    <script type="module">
        import { db, collection, addDoc, getDocs, doc, deleteDoc } from '../common/firebase-config.js';

        // আপনার ImgBB API Key এখানে দিন
        const IMGBB_API_KEY = "YOUR_IMGBB_API_KEY_HERE"; 

        const loadBanners = async () => {
            const list = document.getElementById('banner-list');
            list.innerHTML = '';
            const querySnapshot = await getDocs(collection(db, "banners"));
            
            if(querySnapshot.empty) {
                list.innerHTML = `<div class="text-center text-sm text-gray-400">No Banners Found</div>`;
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                list.innerHTML += `
                    <div class="bg-white p-2 rounded-xl shadow-sm flex items-center justify-between border-l-4 border-orange-500">
                        <img src="${data.image_url}" class="w-24 h-14 rounded-lg object-cover bg-gray-100 border">
                        <button onclick="deleteBanner('${docSnap.id}')" class="text-red-400 hover:text-red-600 p-3 bg-red-50 rounded-lg shadow-sm"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
            });
        };

        document.getElementById('add-btn').addEventListener('click', async () => {
            const file = document.getElementById('banner-image').files[0];
            const btn = document.getElementById('add-btn');
            
            if(!file) return alert("Please select an image file.");
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Uploading...';

            try {
                const formData = new FormData();
                formData.append('image', file);
                
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if(data.success) {
                    await addDoc(collection(db, "banners"), { 
                        image_url: data.data.url,
                        created_at: new Date()
                    });
                    document.getElementById('banner-image').value = '';
                    loadBanners();
                } else {
                    alert("Image upload failed!");
                }
            } catch (error) {
                alert("Error: " + error.message);
            } finally {
                btn.innerHTML = 'Upload Banner';
            }
        });

        window.deleteBanner = async (id) => {
            if(confirm('Are you sure you want to delete this banner?')) {
                await deleteDoc(doc(db, "banners", id));
                loadBanners();
            }
        };

        loadBanners();
    </script>
</body>
</html>
