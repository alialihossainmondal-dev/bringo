<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 select-none pb-20">
    <div class="bg-orange-600 text-white p-4 sticky top-0 flex items-center shadow-md z-40">
        <a href="index.html" class="mr-4"><i class="fa-solid fa-arrow-left text-xl"></i></a>
        <h1 class="text-xl font-bold">Registered Users</h1>
    </div>

    <div class="p-4">
        <!-- Search -->
        <div class="relative mb-4 shadow-sm">
            <input type="text" placeholder="Search users by name or email..." class="w-full py-2.5 pl-10 pr-4 rounded-xl text-gray-800 text-sm focus:outline-none border border-gray-200">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
        </div>

        <!-- User List -->
        <div id="user-list" class="space-y-3">
            <div class="text-center text-sm text-gray-500 py-10"><i class="fa-solid fa-spinner fa-spin text-2xl text-orange-500"></i></div>
        </div>
    </div>

    <script type="module">
        import { db, collection, getDocs } from '../common/firebase-config.js';

        async function loadUsers() {
            const list = document.getElementById('user-list');
            const querySnapshot = await getDocs(collection(db, "users"));
            list.innerHTML = '';
            
            if(querySnapshot.empty) {
                list.innerHTML = `<div class="text-center text-gray-500">No users found.</div>`;
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm flex items-center gap-4">
                        <img src="${data.photoURL || 'https://via.placeholder.com/50'}" class="w-12 h-12 rounded-full bg-gray-100 border border-gray-200 object-cover">
                        <div class="flex-1 overflow-hidden">
                            <h3 class="font-bold text-gray-800 text-sm truncate">${data.name || 'Unknown User'}</h3>
                            <p class="text-xs text-gray-500 truncate">${data.email}</p>
                            ${data.phone ? `<p class="text-xs text-orange-500 font-bold mt-0.5"><i class="fa-solid fa-phone mr-1"></i>${data.phone}</p>` : ''}
                        </div>
                    </div>`;
            });
        }
        loadUsers();
    </script>
</body>
</html>
