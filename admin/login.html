<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bringo - Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 h-screen flex items-center justify-center select-none overflow-hidden">
    <div class="bg-white p-8 rounded-2xl shadow-xl text-center w-80">
        <div class="w-16 h-16 bg-gray-900 rounded-full mx-auto mb-4 flex items-center justify-center shadow-lg">
            <i class="fa-solid fa-shield-halved text-3xl text-yellow-400"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-1">Admin Portal</h1>
        <p class="text-gray-500 text-xs mb-8">Secure access required.</p>
        
        <button id="admin-login" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-xl shadow transition duration-200 flex items-center justify-center gap-2">
            <i class="fa-brands fa-google"></i> Login as Admin
        </button>
        <p id="error-msg" class="text-red-500 text-xs mt-4 hidden font-bold">Unauthorized. Access Denied.</p>
    </div>

    <script type="module">
        import { auth, provider, signInWithPopup, db, doc, getDoc } from '../common/firebase-config.js';

        document.getElementById('admin-login').addEventListener('click', async () => {
            const btn = document.getElementById('admin-login');
            const errorMsg = document.getElementById('error-msg');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verifying...';
            errorMsg.classList.add('hidden');

            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                // Security Check: Look for the user's email in the 'admins' collection
                const adminRef = doc(db, 'admins', user.email);
                const adminSnap = await getDoc(adminRef);
                
                if (adminSnap.exists()) {
                    window.location.href = 'index.html'; // Grant Access
                } else {
                    // Force sign out if not an admin
                    await auth.signOut();
                    errorMsg.classList.remove('hidden');
                    btn.innerHTML = '<i class="fa-brands fa-google"></i> Login as Admin';
                }
            } catch (error) {
                alert("Login Failed: " + error.message);
                btn.innerHTML = '<i class="fa-brands fa-google"></i> Login as Admin';
            }
        });
    </script>
</body>
</html>
