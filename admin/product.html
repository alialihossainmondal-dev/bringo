<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 select-none pb-20">
    <div class="bg-orange-600 text-white p-4 sticky top-0 flex items-center shadow-md z-40">
        <a href="index.html" class="mr-4"><i class="fa-solid fa-arrow-left text-xl"></i></a>
        <h1 class="text-xl font-bold">Manage Products</h1>
    </div>

    <div class="p-4">
        <!-- Add Product Form -->
        <div class="bg-white p-4 rounded-xl shadow-sm mb-6">
            <h2 class="font-bold text-gray-800 mb-3 uppercase text-sm"><i class="fa-solid fa-plus text-orange-500 mr-1"></i> Add Product</h2>
            
            <input type="text" id="p-name" placeholder="Product Name" class="w-full border rounded-lg p-2 text-sm focus:outline-none focus:border-orange-500 mb-3">
            
            <select id="p-category" class="w-full border rounded-lg p-2 text-sm text-gray-700 bg-gray-50 mb-3 focus:outline-none focus:border-orange-500 font-bold">
                <option value="">Select Category...</option>
                <!-- Categories will load here dynamically -->
            </select>

            <div class="grid grid-cols-2 gap-3 mb-3">
                <input type="number" id="p-price" placeholder="Price (₹)" class="w-full border rounded-lg p-2 text-sm focus:outline-none focus:border-orange-500">
                <input type="number" id="p-stock" placeholder="Stock Qty" class="w-full border rounded-lg p-2 text-sm focus:outline-none focus:border-orange-500">
            </div>

            <select id="p-pay-type" class="w-full border rounded-lg p-2 text-sm text-gray-700 bg-white mb-3 focus:outline-none focus:border-orange-500">
                <option value="Both">Payment: Both (COD & Prepaid)</option>
                <option value="Prepaid">Prepaid Only (Requires QR scan)</option>
                <option value="COD">COD Only</option>
            </select>

            <textarea id="p-desc" placeholder="Product Description" rows="2" class="w-full border rounded-lg p-2 text-sm focus:outline-none focus:border-orange-500 mb-3"></textarea>
            
            <!-- NEW: Multiple File Input -->
            <input type="file" id="p-image" accept="image/*" multiple class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-orange-50 file:text-orange-700 mb-1">
            <p class="text-[10px] text-gray-400 mb-3 ml-1 font-bold"><i class="fa-solid fa-circle-info mr-1"></i>Select Minimum 1 & Maximum 5 images.</p>
            
            <button id="add-btn" class="w-full bg-orange-500 text-white font-bold py-2 rounded-lg text-sm shadow hover:bg-orange-600">Save Product</button>
        </div>

        <h2 class="font-bold text-gray-800 mb-3 uppercase text-sm">Inventory</h2>
        <div id="product-list" class="space-y-3"></div>
    </div>

    <script type="module">
        import { db, collection, addDoc, getDocs, doc, deleteDoc } from '../common/firebase-config.js';

        // আপনার ImgBB API Key এখানে দিন
        const IMGBB_API_KEY = "84d1381ec359c2c06ec716c61534f33e";

        const loadCategories = async () => {
            const catSelect = document.getElementById('p-category');
            const querySnapshot = await getDocs(collection(db, "categories"));
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                catSelect.innerHTML += `<option value="${data.name}">${data.name}</option>`;
            });
        };

        const loadProducts = async () => {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            const querySnapshot = await getDocs(collection(db, "products"));
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const badgeColor = data.payment_type === 'Prepaid' ? 'bg-yellow-100 text-yellow-800' : 'bg-gray-100 text-gray-600';
                
                // Show how many images this product has
                const imageCount = data.images ? data.images.length : 1;

                list.innerHTML += `
                    <div class="bg-white p-3 rounded-xl shadow-sm flex items-start gap-3 border-l-4 border-orange-500 relative">
                        <div class="relative">
                            <img src="${data.image_url}" class="w-16 h-16 rounded-lg object-cover bg-gray-50 border">
                            <span class="absolute -bottom-2 -right-2 bg-orange-100 text-orange-600 text-[9px] font-black px-1.5 py-0.5 rounded shadow-sm border border-orange-200">
                                <i class="fa-regular fa-images"></i> ${imageCount}
                            </span>
                        </div>
                        <div class="flex-1 overflow-hidden ml-2">
                            <span class="text-[10px] font-bold text-orange-500 uppercase tracking-wider">${data.category || 'Uncategorized'}</span>
                            <h3 class="font-bold text-gray-800 text-sm leading-tight truncate">${data.name}</h3>
                            <p class="text-orange-600 font-bold text-sm">₹${data.price} <span class="text-xs text-gray-400 font-normal ml-2">Stock: ${data.stock}</span></p>
                            <span class="inline-block mt-1 px-2 py-0.5 rounded text-[10px] font-bold ${badgeColor}">${data.payment_type}</span>
                        </div>
                        <button onclick="deleteProd('${docSnap.id}')" class="text-red-400 hover:text-red-600 p-2 absolute top-2 right-2"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
            });
        };

        document.getElementById('add-btn').addEventListener('click', async () => {
            const name = document.getElementById('p-name').value;
            const category = document.getElementById('p-category').value;
            const price = document.getElementById('p-price').value;
            const stock = document.getElementById('p-stock').value;
            const type = document.getElementById('p-pay-type').value;
            const desc = document.getElementById('p-desc').value;
            const files = document.getElementById('p-image').files;
            const btn = document.getElementById('add-btn');
            
            if(!name || !category || !price) return alert("Please fill all required fields.");
            
            // Image count validation (1 to 5)
            if(files.length < 1 || files.length > 5) {
                return alert("Please select a minimum of 1 and a maximum of 5 images.");
            }
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Uploading Images...';

            try {
                // Upload all selected images to ImgBB concurrently for speed
                let uploadedUrls = [];
                const uploadPromises = Array.from(files).map(async (file) => {
                    const formData = new FormData();
                    formData.append('image', file);
                    
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                        method: 'POST',
                        body: formData
                    });
                    const imgData = await response.json();
                    
                    if(imgData.success) {
                        return imgData.data.url;
                    } else {
                        throw new Error("One of the images failed to upload.");
                    }
                });

                uploadedUrls = await Promise.all(uploadPromises);

                // Save to Firestore
                await addDoc(collection(db, "products"), { 
                    name, 
                    category, 
                    price: Number(price), 
                    stock: Number(stock), 
                    payment_type: type, 
                    description: desc, 
                    image_url: uploadedUrls[0], // First image acts as the main thumbnail
                    images: uploadedUrls, // Array of all uploaded images (1 to 5)
                    created_at: new Date()
                });
                
                document.getElementById('p-name').value = '';
                document.getElementById('p-category').value = '';
                document.getElementById('p-price').value = '';
                document.getElementById('p-stock').value = '';
                document.getElementById('p-desc').value = '';
                document.getElementById('p-image').value = '';
                
                loadProducts();
                alert("Product Saved Successfully!");
                
            } catch (error) {
                alert("Error: " + error.message);
            } finally {
                btn.innerHTML = 'Save Product';
            }
        });

        window.deleteProd = async (id) => {
            if(confirm('Delete product?')) {
                await deleteDoc(doc(db, "products", id));
                loadProducts();
            }
        };

        loadCategories();
        loadProducts();
    </script>
</body>
</html>
