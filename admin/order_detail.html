<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Order Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 select-none pb-24">
    <div class="bg-orange-600 text-white p-4 sticky top-0 flex items-center shadow-md z-40">
        <a href="order.html" class="mr-4"><i class="fa-solid fa-arrow-left text-xl"></i></a>
        <h1 class="text-xl font-bold">Order #<span id="header-id">---</span></h1>
    </div>

    <div class="p-4 space-y-4">
        <!-- Status Update -->
        <div class="bg-white p-4 rounded-xl shadow-sm">
            <h2 class="font-bold text-gray-800 mb-2 text-sm uppercase">Update Status</h2>
            <div class="flex gap-2">
                <select id="status-select" class="flex-1 border rounded-lg p-2 text-sm focus:outline-none focus:border-orange-500 bg-gray-50 font-bold">
                    <option value="Placed">Placed / Pending Verification</option>
                    <option value="Confirmed">Payment Confirmed</option>
                    <option value="Dispatched">Dispatched</option>
                    <option value="Delivered">Delivered</option>
                    <option value="Cancelled">Cancelled</option>
                </select>
                <button id="update-btn" class="bg-orange-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-orange-600">Update</button>
            </div>
        </div>

        <!-- Payment Info (Crucial for Prepaid) -->
        <div id="payment-card" class="bg-white p-4 rounded-xl shadow-sm border-2 border-transparent">
            <h2 class="font-bold text-gray-800 mb-3 text-sm uppercase"><i class="fa-solid fa-wallet text-orange-500 mr-1"></i> Payment Details</h2>
            <div class="grid grid-cols-2 gap-2 text-sm">
                <div class="text-gray-500">Method:</div>
                <div id="pay-method" class="font-bold text-gray-800 uppercase text-right">---</div>
                
                <div class="text-gray-500">Total Amount:</div>
                <div id="pay-amount" class="font-bold text-orange-600 text-right">---</div>
                
                <div class="text-gray-500">Transaction ID:</div>
                <div id="pay-tx" class="font-bold text-gray-800 text-right break-all">---</div>
            </div>
            
            <div id="verify-warning" class="mt-3 bg-yellow-100 text-yellow-800 p-2 rounded-lg text-xs font-bold hidden flex items-start gap-2">
                <i class="fa-solid fa-triangle-exclamation mt-0.5"></i>
                <p>Prepaid Order. Please verify the Transaction ID in your Bank App before changing status to Confirmed.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, doc, getDoc, updateDoc } from '../common/firebase-config.js';

        // Get ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('id');
        let orderRef = null;

        if(!orderId) {
            alert('Invalid Order ID');
            window.location.href = 'order.html';
        } else {
            document.getElementById('header-id').innerText = orderId.slice(-6).toUpperCase();
            orderRef = doc(db, 'orders', orderId);
            loadDetails();
        }

        async function loadDetails() {
            const snap = await getDoc(orderRef);
            if(snap.exists()) {
                const data = snap.data();
                
                document.getElementById('status-select').value = data.status;
                document.getElementById('pay-method').innerText = data.payment_method;
                document.getElementById('pay-amount').innerText = `₹${data.total_amount}`;
                document.getElementById('pay-tx').innerText = data.transaction_id || 'N/A';

                if(data.payment_method === 'prepaid' && data.status === 'Placed') {
                    document.getElementById('payment-card').classList.replace('border-transparent', 'border-orange-400');
                    document.getElementById('verify-warning').classList.remove('hidden');
                }
            }
        }

        document.getElementById('update-btn').addEventListener('click', async () => {
            const newStatus = document.getElementById('status-select').value;
            const btn = document.getElementById('update-btn');
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            try {
                await updateDoc(orderRef, { status: newStatus });
                alert('Status Updated!');
                document.getElementById('payment-card').classList.replace('border-orange-400', 'border-transparent');
                document.getElementById('verify-warning').classList.add('hidden');
            } catch(e) {
                alert('Error updating status');
            }
            btn.innerHTML = 'Update';
        });
    </script>
</body>
</html>
