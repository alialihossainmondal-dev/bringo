<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bringo - My Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 select-none pb-20">
    <!-- Header -->
    <div class="bg-orange-500 text-white p-4 sticky top-0 flex items-center shadow-md z-40">
        <a href="profile.html" class="mr-4"><i class="fa-solid fa-arrow-left text-xl"></i></a>
        <h1 class="text-xl font-bold">My Orders</h1>
    </div>

    <!-- Order List Container -->
    <div class="p-4 space-y-4" id="order-list">
        <div class="text-center text-gray-500 mt-10"><i class="fa-solid fa-spinner fa-spin text-3xl"></i><br>Loading Orders...</div>
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around items-center h-16 z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <a href="index.html" class="flex flex-col items-center text-gray-400 hover:text-orange-500"><i class="fa-solid fa-house text-xl"></i></a>
        <a href="cart.html" class="flex flex-col items-center text-gray-400 hover:text-orange-500"><i class="fa-solid fa-cart-shopping text-xl"></i></a>
        <a href="order.html" class="flex flex-col items-center text-orange-500"><i class="fa-solid fa-box-open text-xl"></i></a>
        <a href="profile.html" class="flex flex-col items-center text-gray-400 hover:text-orange-500"><i class="fa-solid fa-user text-xl"></i></a>
    </div>

    <script type="module">
        import { db, collection, query, where, getDocs, auth, onAuthStateChanged } from './common/firebase-config.js';

        onAuthStateChanged(auth, async (user) => {
            const list = document.getElementById('order-list');
            if (!user) {
                list.innerHTML = `<div class="text-center mt-10"><p class="mb-4 text-gray-500 font-bold">Please login to see your orders</p><a href="login.html" class="bg-orange-500 text-white px-6 py-2 rounded-xl shadow-md font-bold inline-block">Login Now</a></div>`;
                return;
            }

            try {
                // শুধু ওই ইউজারের অর্ডারগুলোই আনবে
                const q = query(collection(db, "orders"), where("user_id", "==", user.uid));
                const snap = await getDocs(q);
                
                if (snap.empty) {
                    list.innerHTML = `<div class="text-center mt-10 text-gray-400"><i class="fa-solid fa-box-open text-5xl mb-3 opacity-50"></i><p class="font-bold text-sm">You haven't placed any orders yet.</p></div>`;
                    return;
                }

                let orders = [];
                snap.forEach(doc => { orders.push({ id: doc.id, ...doc.data() }); });
                orders.sort((a, b) => b.created_at.seconds - a.created_at.seconds); // নতুন অর্ডার আগে

                list.innerHTML = '';
                orders.forEach(data => {
                    const date = new Date(data.created_at.seconds * 1000).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                    
                    // Status Badge Colors & Icons (অ্যাডমিন যা সিলেক্ট করবে তার ওপর ভিত্তি করে রঙ বদলাবে)
                    let statusColor = 'bg-blue-50 border-blue-200 text-blue-700'; // Placed
                    let statusIcon = '<i class="fa-solid fa-box"></i>';
                    
                    if(data.status === 'Processing') { 
                        statusColor = 'bg-yellow-50 border-yellow-200 text-yellow-700'; 
                        statusIcon = '<i class="fa-solid fa-spinner fa-spin"></i>'; 
                    }
                    else if(data.status === 'Shipped') { 
                        statusColor = 'bg-purple-50 border-purple-200 text-purple-700'; 
                        statusIcon = '<i class="fa-solid fa-truck-fast"></i>'; 
                    }
                    else if(data.status === 'Delivered') { 
                        statusColor = 'bg-green-50 border-green-200 text-green-700'; 
                        statusIcon = '<i class="fa-solid fa-circle-check"></i>'; 
                    }
                    else if(data.status === 'Cancelled') { 
                        statusColor = 'bg-red-50 border-red-200 text-red-700'; 
                        statusIcon = '<i class="fa-solid fa-circle-xmark"></i>'; 
                    }

                    // প্রোডাক্টের নামগুলো একটি লাইনে দেখানোর জন্য
                    let itemsHtml = '';
                    if(data.items && data.items.length > 0) {
                        const itemNames = data.items.map(i => `<span class="font-bold text-gray-700">${i.name}</span> (x${i.qty})`).join(', ');
                        itemsHtml = `<p class="text-[11px] text-gray-500 mt-3 leading-relaxed border-t pt-2 border-dashed"><b>Items:</b> ${itemNames}</p>`;
                    }

                    list.innerHTML += `
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 relative overflow-hidden">
                            <div class="flex justify-between items-start mb-1">
                                <div>
                                    <p class="text-[9px] text-gray-400 font-black uppercase tracking-wider mb-1">Ordered on ${date}</p>
                                    <p class="font-black text-gray-800 text-lg">₹${data.total_amount} <span class="text-[10px] font-bold text-orange-500 uppercase ml-1">(${data.payment_method})</span></p>
                                </div>
                            </div>
                            
                            <!-- Status Badge -->
                            <div class="mt-3">
                                <div class="px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-2 border ${statusColor} w-max shadow-sm">
                                    ${statusIcon} Order ${data.status || 'Placed'}
                                </div>
                            </div>
                            
                            ${itemsHtml}
                        </div>`;
                });
            } catch (error) {
                list.innerHTML = `<div class="text-center text-red-500 mt-10">Error loading orders: ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
