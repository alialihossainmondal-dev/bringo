<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bringo - Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 select-none pb-32">
    <div class="bg-orange-500 text-white p-4 sticky top-0 flex items-center shadow-md z-40">
        <a href="index.html" class="mr-4"><i class="fa-solid fa-arrow-left text-xl"></i></a>
        <h1 class="text-xl font-bold">My Cart</h1>
    </div>

    <div class="p-4 space-y-3" id="cart-items">
        <!-- Cart items will be loaded here dynamically -->
    </div>

    <!-- Checkout Footer -->
    <div class="fixed bottom-0 w-full bg-white border-t p-4 rounded-t-2xl shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-50">
        <div class="flex justify-between items-center mb-3">
            <span class="text-gray-500 text-sm font-bold">Total Amount</span>
            <span class="text-xl font-bold text-gray-800" id="cart-total">₹0</span>
        </div>
        <button id="checkout-btn" class="block w-full bg-yellow-400 text-orange-900 text-center font-bold py-3 rounded-xl shadow hover:bg-yellow-500">
            Proceed to Checkout
        </button>
    </div>

    <script type="module">
        import { auth, onAuthStateChanged } from './common/firebase-config.js';

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                alert("Please login to view your cart!");
                window.location.href = 'login.html';
            }
        });

        function renderCart() {
            const list = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            let cart = JSON.parse(localStorage.getItem('bringo_cart')) || [];
            
            list.innerHTML = '';
            let totalAmount = 0;

            if (cart.length === 0) {
                list.innerHTML = `<div class="text-center text-gray-400 mt-10"><i class="fa-solid fa-cart-shopping text-4xl mb-3"></i><p>Your cart is empty.</p></div>`;
                totalEl.innerText = '₹0';
                document.getElementById('checkout-btn').classList.add('opacity-50', 'pointer-events-none');
                return;
            }

            document.getElementById('checkout-btn').classList.remove('opacity-50', 'pointer-events-none');

            cart.forEach((item, index) => {
                totalAmount += (item.price * item.qty);
                list.innerHTML += `
                    <div class="bg-white p-3 rounded-xl shadow-sm flex items-center gap-3">
                        <img src="${item.image}" class="w-16 h-16 object-cover rounded-lg bg-gray-100 border">
                        <div class="flex-1 overflow-hidden">
                            <h3 class="text-sm font-bold text-gray-800 truncate">${item.name}</h3>
                            <p class="text-orange-600 font-bold text-sm">₹${item.price}</p>
                            <div class="flex items-center gap-3 mt-2">
                                <button onclick="changeQty('${item.id}', -1)" class="w-6 h-6 bg-gray-100 rounded-full text-gray-600 hover:bg-orange-100"><i class="fa-solid fa-minus text-xs"></i></button>
                                <span class="text-sm font-bold">${item.qty}</span>
                                <button onclick="changeQty('${item.id}', 1)" class="w-6 h-6 bg-gray-100 rounded-full text-gray-600 hover:bg-orange-100"><i class="fa-solid fa-plus text-xs"></i></button>
                            </div>
                        </div>
                        <button onclick="removeItem('${item.id}')" class="text-red-400 hover:text-red-600 p-2"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
            });

            totalEl.innerText = `₹${totalAmount}`;
        }

        window.changeQty = (id, change) => {
            let cart = JSON.parse(localStorage.getItem('bringo_cart')) || [];
            let item = cart.find(i => i.id === id);
            if(item) {
                item.qty += change;
                if(item.qty <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
                localStorage.setItem('bringo_cart', JSON.stringify(cart));
                renderCart();
            }
        };

        window.removeItem = (id) => {
            let cart = JSON.parse(localStorage.getItem('bringo_cart')) || [];
            cart = cart.filter(i => i.id !== id);
            localStorage.setItem('bringo_cart', JSON.stringify(cart));
            renderCart();
        };

        document.getElementById('checkout-btn').addEventListener('click', () => {
            window.location.href = 'checkout.html';
        });

        renderCart();
    </script>
</body>
</html>
