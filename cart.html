<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bringo - Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 select-none pb-32">
    <div class="bg-orange-500 text-white p-4 sticky top-0 flex items-center shadow-md z-40">
        <a href="index.html" class="mr-4"><i class="fa-solid fa-arrow-left text-xl"></i></a>
        <h1 class="text-xl font-bold">My Cart</h1>
    </div>

    <div class="p-4 space-y-3" id="cart-items">
        <!-- Mock Cart Item -->
        <div class="bg-white p-3 rounded-xl shadow-sm flex items-center gap-3">
            <img src="https://via.placeholder.com/80" class="w-16 h-16 object-cover rounded-lg bg-gray-100">
            <div class="flex-1">
                <h3 class="text-sm font-bold text-gray-800">Premium Wireless Headphones</h3>
                <p class="text-orange-600 font-bold text-sm">₹1500</p>
                <div class="flex items-center gap-3 mt-2">
                    <button class="w-6 h-6 bg-gray-100 rounded-full text-gray-600 hover:bg-orange-100"><i class="fa-solid fa-minus text-xs"></i></button>
                    <span class="text-sm font-bold">1</span>
                    <button class="w-6 h-6 bg-gray-100 rounded-full text-gray-600 hover:bg-orange-100"><i class="fa-solid fa-plus text-xs"></i></button>
                </div>
            </div>
            <button class="text-red-400 hover:text-red-600 p-2"><i class="fa-solid fa-trash"></i></button>
        </div>
    </div>

    <!-- Checkout Footer -->
    <div class="fixed bottom-0 w-full bg-white border-t p-4 rounded-t-2xl shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-50">
        <div class="flex justify-between items-center mb-3">
            <span class="text-gray-500 text-sm font-bold">Total Amount</span>
            <span class="text-xl font-bold text-gray-800">₹1500</span>
        </div>
        <a href="checkout.html" class="block w-full bg-yellow-400 text-orange-900 text-center font-bold py-3 rounded-xl shadow hover:bg-yellow-500">
            Proceed to Checkout
        </a>
    </div>

    <script type="module">
        import './common/security.js';
        // Cart logic will use localStorage mapped against products in real implementation.
    </script>
</body>
</html>
