<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bringo - Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 select-none pb-20">
    <!-- Header -->
    <div class="bg-orange-500 text-white p-4 sticky top-0 flex items-center shadow-md z-40">
        <a href="cart.html" class="mr-4"><i class="fa-solid fa-arrow-left text-xl"></i></a>
        <h1 class="text-xl font-bold">Checkout</h1>
    </div>

    <div class="p-4 space-y-4">
        
        <!-- Promo Code Section -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <h2 class="font-bold text-gray-800 mb-2 text-sm"><i class="fa-solid fa-tag text-orange-500 mr-1"></i> Apply Coupon</h2>
            <div class="flex gap-2">
                <input type="text" id="promo-code" placeholder="Enter code" class="flex-1 border rounded-lg p-2 text-sm focus:outline-none focus:border-orange-500 uppercase font-bold text-gray-700 tracking-wider">
                <button id="apply-promo-btn" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-black transition">Apply</button>
            </div>
            <p id="promo-msg" class="text-[11px] font-bold mt-2 hidden"></p>
        </div>

        <!-- Order Summary -->
        <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-yellow-400">
            <div class="flex justify-between items-center mb-1 text-sm text-gray-500">
                <span>Subtotal</span>
                <span id="subtotal-amount" class="font-bold text-gray-700">₹0</span>
            </div>
            <div id="discount-row" class="flex justify-between items-center mb-2 text-sm text-green-600 font-bold hidden">
                <span>Discount applied</span>
                <span id="discount-amount">-₹0</span>
            </div>
            <hr class="my-2 border-dashed border-gray-200">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-gray-800">Total to Pay</h2>
                <p id="pay-amount-top" class="text-2xl font-black text-orange-600">₹0</p>
            </div>
        </div>

        <!-- Delivery Details -->
        <div class="bg-white p-4 rounded-xl shadow-sm">
            <h2 class="font-bold text-gray-800 mb-3 text-sm"><i class="fa-solid fa-location-dot text-orange-500 mr-1"></i> Delivery Details</h2>
            <textarea id="address" class="w-full border rounded-lg p-2 text-sm focus:outline-none focus:border-orange-500 bg-gray-50" rows="3" placeholder="Enter complete address"></textarea>
            <input type="tel" id="phone" class="w-full border rounded-lg p-2 mt-2 text-sm focus:outline-none focus:border-orange-500 bg-gray-50" placeholder="Phone Number">
        </div>

        <!-- Order Notes -->
        <div class="bg-white p-4 rounded-xl shadow-sm">
            <h2 class="font-bold text-gray-800 mb-1 text-sm"><i class="fa-solid fa-clipboard-list text-orange-500 mr-1"></i> Order Notes</h2>
            <p class="text-[10px] text-gray-500 mb-2">Write your preferred Size, Color, or any details (Optional)</p>
            <textarea id="order-notes" class="w-full border rounded-lg p-2 text-sm focus:outline-none focus:border-orange-500 bg-gray-50" rows="2" placeholder="E.g., Shirt Size: L, Color: Black..."></textarea>
        </div>

        <!-- Payment Method -->
        <div class="bg-white p-4 rounded-xl shadow-sm">
            <h2 class="font-bold text-gray-800 mb-3 text-sm"><i class="fa-solid fa-wallet text-orange-500 mr-1"></i> Payment Method</h2>
            <select id="payment-method" class="w-full border rounded-lg p-2 bg-gray-50 text-gray-800 focus:outline-none font-bold text-sm">
                <option value="cod">Cash on Delivery (COD)</option>
                <option value="prepaid">Prepaid (UPI QR)</option>
            </select>
            <p id="prepaid-warning" class="text-xs text-red-500 mt-2 font-bold hidden"><i class="fa-solid fa-circle-exclamation"></i> Some items in your cart are "Prepaid Only". COD is disabled.</p>
        </div>

        <!-- QR Section (Hidden by default) -->
        <div id="qr-section" class="bg-white p-4 rounded-xl shadow-sm hidden text-center border border-orange-200 bg-orange-50/50">
            <h3 class="font-bold text-gray-800 mb-2 text-sm">Scan to Pay <span id="pay-amount-qr" class="text-orange-600 text-lg"></span></h3>
            <img id="admin-qr" src="" alt="UPI QR" class="w-40 h-40 mx-auto border-2 border-yellow-400 rounded-lg mb-3 object-contain bg-white">
            <input type="text" id="transaction-id" class="w-full border rounded-lg p-2 text-sm focus:outline-none focus:border-orange-500 text-center font-bold" placeholder="Enter UTR / Transaction ID (Required)">
        </div>

        <button id="place-order-btn" class="w-full bg-orange-500 text-white font-bold py-3.5 rounded-xl shadow-lg mt-2 hover:bg-orange-600 transition-colors text-sm">
            Confirm & Place Order
        </button>
    </div>

    <script type="module">
        // খেয়াল করুন: এখানে query, where, getDocs সবকিছু ইমপোর্ট করা হয়েছে
        import { auth, db, doc, getDoc, addDoc, collection, onAuthStateChanged, query, where, getDocs } from './common/firebase-config.js';
        
        let cart = JSON.parse(localStorage.getItem('bringo_cart')) || [];
        if(cart.length === 0) {
            window.location.href = 'index.html';
        }

        let cartSubTotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        let cartTotal = cartSubTotal;
        let requiresPrepaid = cart.some(item => item.type === 'Prepaid');
        
        // Promo Variables
        let appliedDiscount = 0;
        let appliedPromoCode = null;

        document.getElementById('subtotal-amount').innerText = `₹${cartSubTotal}`;
        document.getElementById('pay-amount-top').innerText = `₹${cartTotal}`;
        document.getElementById('pay-amount-qr').innerText = `₹${cartTotal}`;

        // Dynamic Promo Code Logic
        document.getElementById('apply-promo-btn').addEventListener('click', async () => {
            const codeInput = document.getElementById('promo-code').value.trim().toUpperCase();
            const msgBox = document.getElementById('promo-msg');
            const btn = document.getElementById('apply-promo-btn');

            if(!codeInput) return;

            if(appliedPromoCode) {
                msgBox.innerText = "A coupon is already applied!";
                msgBox.className = "text-[11px] font-bold mt-2 text-red-500 block";
                return;
            }

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            btn.disabled = true;

            try {
                const q = query(collection(db, "coupons"), where("code", "==", codeInput));
                const querySnapshot = await getDocs(q);

                if(!querySnapshot.empty) {
                    const couponData = querySnapshot.docs[0].data();
                    
                    if(cartSubTotal >= couponData.min_order_value) {
                        appliedDiscount = couponData.discount_amount;
                        appliedPromoCode = codeInput;
                        cartTotal = cartSubTotal - appliedDiscount;

                        document.getElementById('discount-row').classList.remove('hidden');
                        document.getElementById('discount-amount').innerText = `-₹${appliedDiscount}`;
                        document.getElementById('pay-amount-top').innerText = `₹${cartTotal}`;
                        document.getElementById('pay-amount-qr').innerText = `₹${cartTotal}`;

                        msgBox.innerText = `Yay! ₹${appliedDiscount} Discount applied successfully. 🎉`;
                        msgBox.className = "text-[11px] font-bold mt-2 text-green-600 block";
                        
                        btn.innerText = "Applied";
                        btn.classList.replace('bg-gray-800', 'bg-green-600');
                        document.getElementById('promo-code').disabled = true;
                    } else {
                        msgBox.innerText = `Order value must be at least ₹${couponData.min_order_value} to use this coupon.`;
                        msgBox.className = "text-[11px] font-bold mt-2 text-red-500 block";
                        btn.innerText = "Apply";
                        btn.disabled = false;
                    }
                } else {
                    msgBox.innerText = "Invalid or expired promo code.";
                    msgBox.className = "text-[11px] font-bold mt-2 text-red-500 block";
                    btn.innerText = "Apply";
                    btn.disabled = false;
                }
            } catch(error) {
                msgBox.innerText = "Error checking code. Please try again.";
                msgBox.className = "text-[11px] font-bold mt-2 text-red-500 block";
                btn.innerText = "Apply";
                btn.disabled = false;
            }
        });

        // Payment Method Logic
        const paymentSelect = document.getElementById('payment-method');
        const qrSection = document.getElementById('qr-section');

        if(requiresPrepaid) {
            paymentSelect.value = 'prepaid';
            paymentSelect.disabled = true;
            qrSection.classList.remove('hidden');
            document.getElementById('prepaid-warning').classList.remove('hidden');
        }

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                alert("Please login to place an order!");
                window.location.href = 'login.html';
            }
        });

        async function fetchSettings() {
            try {
                const docSnap = await getDoc(doc(db, 'settings', 'global'));
                if (docSnap.exists() && docSnap.data().upi_qr_code_image_url) {
                    document.getElementById('admin-qr').src = docSnap.data().upi_qr_code_image_url;
                }
            } catch (e) {
                console.log("No QR Code set yet.");
            }
        }
        fetchSettings();

        paymentSelect.addEventListener('change', (e) => {
            if(e.target.value === 'prepaid') qrSection.classList.remove('hidden');
            else qrSection.classList.add('hidden');
        });

        // Place Order Logic
        document.getElementById('place-order-btn').addEventListener('click', async () => {
            const address = document.getElementById('address').value;
            const phone = document.getElementById('phone').value;
            const notes = document.getElementById('order-notes').value;
            const method = paymentSelect.value;
            const txId = document.getElementById('transaction-id').value;
            const btn = document.getElementById('place-order-btn');

            if(!address || !phone) return alert('Enter complete address and phone number');
            if(method === 'prepaid' && !txId) return alert('Enter Transaction ID for prepaid orders');

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;

            try {
                await addDoc(collection(db, 'orders'), {
                    user_id: auth.currentUser.uid,
                    subtotal: cartSubTotal,
                    discount_amount: appliedDiscount,
                    promo_code_used: appliedPromoCode || 'None',
                    total_amount: cartTotal,
                    delivery_address: address,
                    phone_number: phone,
                    customer_notes: notes || 'No extra notes provided',
                    payment_method: method,
                    transaction_id: method === 'prepaid' ? txId : null,
                    status: 'Placed',
                    created_at: new Date(),
                    items: cart
                });
                
                localStorage.removeItem('bringo_cart');
                alert('Order Placed Successfully!');
                window.location.href = 'order.html';
            } catch (error) {
                alert("Error placing order: " + error.message);
                btn.innerHTML = 'Confirm & Place Order';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
