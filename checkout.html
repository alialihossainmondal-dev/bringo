<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bringo - Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 select-none pb-20">
    <div class="bg-orange-500 text-white p-4 sticky top-0 flex items-center shadow-md z-40">
        <a href="cart.html" class="mr-4"><i class="fa-solid fa-arrow-left text-xl"></i></a>
        <h1 class="text-xl font-bold">Checkout</h1>
    </div>

    <div class="p-4 space-y-4">
        <!-- Order Summary -->
        <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-yellow-400">
            <h2 class="font-bold text-gray-800 mb-1">Total Amount to Pay</h2>
            <p id="pay-amount-top" class="text-2xl font-black text-orange-600">₹0</p>
        </div>

        <!-- Delivery Details -->
        <div class="bg-white p-4 rounded-xl shadow-sm">
            <h2 class="font-bold text-gray-800 mb-3"><i class="fa-solid fa-location-dot text-orange-500"></i> Delivery Details</h2>
            <textarea id="address" class="w-full border rounded-lg p-2 text-sm focus:outline-none focus:border-orange-500" rows="3" placeholder="Enter complete address"></textarea>
            <input type="tel" id="phone" class="w-full border rounded-lg p-2 mt-2 text-sm focus:outline-none focus:border-orange-500" placeholder="Phone Number">
        </div>

        <!-- NEW: Order Notes / Customization -->
        <div class="bg-white p-4 rounded-xl shadow-sm">
            <h2 class="font-bold text-gray-800 mb-1"><i class="fa-solid fa-clipboard-list text-orange-500"></i> Order Notes</h2>
            <p class="text-[10px] text-gray-500 mb-3">Write your preferred Size, Color, or any other details here (Optional)</p>
            <textarea id="order-notes" class="w-full border rounded-lg p-2 text-sm focus:outline-none focus:border-orange-500 bg-gray-50" rows="2" placeholder="E.g., Shirt Size: L, Color: Black..."></textarea>
        </div>

        <!-- Payment Method -->
        <div class="bg-white p-4 rounded-xl shadow-sm">
            <h2 class="font-bold text-gray-800 mb-3"><i class="fa-solid fa-wallet text-orange-500"></i> Payment Method</h2>
            <select id="payment-method" class="w-full border rounded-lg p-2 bg-gray-50 text-gray-800 focus:outline-none font-bold">
                <option value="cod">Cash on Delivery (COD)</option>
                <option value="prepaid">Prepaid (UPI QR)</option>
            </select>
            <p id="prepaid-warning" class="text-xs text-red-500 mt-2 font-bold hidden"><i class="fa-solid fa-circle-exclamation"></i> Some items in your cart are "Prepaid Only". COD is disabled.</p>
        </div>

        <!-- QR Section (Hidden by default) -->
        <div id="qr-section" class="bg-white p-4 rounded-xl shadow-sm hidden text-center border-2 border-orange-400">
            <h3 class="font-bold text-gray-800 mb-2">Scan to Pay <span id="pay-amount-qr" class="text-orange-600"></span></h3>
            <img id="admin-qr" src="" alt="UPI QR" class="w-48 h-48 mx-auto border-2 border-yellow-400 rounded-lg mb-3 object-contain">
            <input type="text" id="transaction-id" class="w-full border rounded-lg p-2 text-sm focus:outline-none focus:border-orange-500 text-center font-bold" placeholder="Enter UTR / Transaction ID (Required)">
        </div>

        <button id="place-order-btn" class="w-full bg-orange-500 text-white font-bold py-3 rounded-xl shadow-lg mt-4 hover:bg-orange-600">
            Confirm & Place Order
        </button>
    </div>

    <script type="module">
        import { auth, db, doc, getDoc, addDoc, collection, onAuthStateChanged } from './common/firebase-config.js';
        
        // Cart Logic
        let cart = JSON.parse(localStorage.getItem('bringo_cart')) || [];
        if(cart.length === 0) {
            window.location.href = 'index.html';
        }

        let cartTotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        let requiresPrepaid = cart.some(item => item.type === 'Prepaid');

        document.getElementById('pay-amount-top').innerText = `₹${cartTotal}`;
        document.getElementById('pay-amount-qr').innerText = `₹${cartTotal}`;

        const paymentSelect = document.getElementById('payment-method');
        const qrSection = document.getElementById('qr-section');

        // Check if any product is prepaid only
        if(requiresPrepaid) {
            paymentSelect.value = 'prepaid';
            paymentSelect.disabled = true; // Prevent changing to COD
            qrSection.classList.remove('hidden');
            document.getElementById('prepaid-warning').classList.remove('hidden');
        }

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                alert("Please login to place an order!");
                window.location.href = 'login.html';
            }
        });

        async function fetchSettings() {
            const docSnap = await getDoc(doc(db, 'settings', 'global'));
            if (docSnap.exists() && docSnap.data().upi_qr_code_image_url) {
                document.getElementById('admin-qr').src = docSnap.data().upi_qr_code_image_url;
            }
        }
        fetchSettings();

        paymentSelect.addEventListener('change', (e) => {
            if(e.target.value === 'prepaid') qrSection.classList.remove('hidden');
            else qrSection.classList.add('hidden');
        });

        document.getElementById('place-order-btn').addEventListener('click', async () => {
            const address = document.getElementById('address').value;
            const phone = document.getElementById('phone').value;
            const notes = document.getElementById('order-notes').value; // কাস্টমারের দেওয়া ডিটেইলস
            const method = paymentSelect.value;
            const txId = document.getElementById('transaction-id').value;
            const btn = document.getElementById('place-order-btn');

            if(!address || !phone) return alert('Enter complete address and phone number');
            if(method === 'prepaid' && !txId) return alert('Enter Transaction ID for prepaid orders');

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;

            try {
                await addDoc(collection(db, 'orders'), {
                    user_id: auth.currentUser.uid,
                    total_amount: cartTotal,
                    delivery_address: address,
                    phone_number: phone,
                    customer_notes: notes || 'No extra notes provided', // ডাটাবেসে সেভ হবে
                    payment_method: method,
                    transaction_id: method === 'prepaid' ? txId : null,
                    status: 'Placed',
                    created_at: new Date(),
                    items: cart
                });
                
                localStorage.removeItem('bringo_cart');
                alert('Order Placed Successfully!');
                window.location.href = 'order.html';
            } catch (error) {
                alert("Error placing order: " + error.message);
                btn.innerHTML = 'Confirm & Place Order';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
