<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bringo - Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 select-none pb-20">
    <!-- Header -->
    <div class="bg-orange-500 text-white p-4 sticky top-0 flex items-center shadow-md z-40">
        <a href="cart.html" class="mr-4"><i class="fa-solid fa-arrow-left text-xl"></i></a>
        <h1 class="text-xl font-bold">Checkout</h1>
    </div>

    <div class="p-4 space-y-4">
        <!-- Delivery Details -->
        <div class="bg-white p-4 rounded-xl shadow-sm">
            <h2 class="font-bold text-gray-800 mb-3"><i class="fa-solid fa-location-dot text-orange-500"></i> Delivery Address</h2>
            <textarea id="address" class="w-full border rounded-lg p-2 text-sm focus:outline-none focus:border-orange-500" rows="3" placeholder="Enter complete address"></textarea>
            <input type="tel" id="phone" class="w-full border rounded-lg p-2 mt-2 text-sm focus:outline-none focus:border-orange-500" placeholder="Phone Number">
        </div>

        <!-- Payment Method -->
        <div class="bg-white p-4 rounded-xl shadow-sm">
            <h2 class="font-bold text-gray-800 mb-3"><i class="fa-solid fa-wallet text-orange-500"></i> Payment Method</h2>
            <select id="payment-method" class="w-full border rounded-lg p-2 bg-gray-50 text-gray-800 focus:outline-none">
                <option value="cod">Cash on Delivery (COD)</option>
                <option value="prepaid">Prepaid (UPI QR)</option>
            </select>
            <p id="payment-warning" class="text-xs text-red-500 mt-2 hidden">Some items in your cart are Prepaid Only. COD is disabled.</p>
        </div>

        <!-- Manual QR Section (Hidden by default) -->
        <div id="qr-section" class="bg-white p-4 rounded-xl shadow-sm hidden text-center">
            <h3 class="font-bold text-gray-800 mb-2">Scan to Pay <span id="pay-amount" class="text-orange-600"></span></h3>
            <img id="admin-qr" src="" alt="UPI QR" class="w-48 h-48 mx-auto border-2 border-yellow-400 rounded-lg mb-3">
            <input type="text" id="transaction-id" class="w-full border rounded-lg p-2 text-sm focus:outline-none focus:border-orange-500" placeholder="Enter UTR / Transaction ID">
        </div>

        <button id="place-order-btn" class="w-full bg-orange-500 text-white font-bold py-3 rounded-xl shadow-lg mt-4 hover:bg-orange-600">
            Place Order
        </button>
    </div>

    <script type="module">
        import { auth, db, doc, getDoc, addDoc, collection } from './common/firebase-config.js';
        
        let cartTotal = 1500; // Mocked from cart state
        let requiresPrepaid = false; // Set to true if cart contains "Prepaid Only" items

        document.getElementById('pay-amount').innerText = `₹${cartTotal}`;

        // Fetch Global Settings for QR
        async function fetchSettings() {
            const docRef = doc(db, 'settings', 'global');
            const docSnap = await getDoc(docRef);
            if (docSnap.exists() && docSnap.data().upi_qr_code_image_url) {
                document.getElementById('admin-qr').src = docSnap.data().upi_qr_code_image_url;
            }
        }
        fetchSettings();

        // Handle Payment Selection Logic
        const paymentSelect = document.getElementById('payment-method');
        const qrSection = document.getElementById('qr-section');

        paymentSelect.addEventListener('change', (e) => {
            if(e.target.value === 'prepaid') {
                qrSection.classList.remove('hidden');
            } else {
                qrSection.classList.add('hidden');
            }
        });

        // Place Order
        document.getElementById('place-order-btn').addEventListener('click', async () => {
            const address = document.getElementById('address').value;
            const method = paymentSelect.value;
            const txId = document.getElementById('transaction-id').value;

            if(!address) return alert('Enter address');
            if(method === 'prepaid' && !txId) return alert('Enter Transaction ID for prepaid orders');

            try {
                await addDoc(collection(db, 'orders'), {
                    user_id: auth.currentUser ? auth.currentUser.uid : 'guest',
                    total_amount: cartTotal,
                    payment_method: method,
                    transaction_id: method === 'prepaid' ? txId : null,
                    status: 'Placed',
                    created_at: new Date(),
                    items: [] // In real implementation, pull from localStorage cart
                });
                alert('Order Placed Successfully!');
                window.location.href = 'order.html';
            } catch (error) {
                console.error("Error adding document: ", error);
            }
        });
    </script>
</body>
</html>
