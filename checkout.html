<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bringo - Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 pb-20">

    <div class="bg-orange-500 text-white p-4 sticky top-0 flex items-center shadow-md z-40">
        <a href="cart.html" class="mr-4"><i class="fa-solid fa-arrow-left"></i></a>
        <h1 class="text-xl font-bold">Checkout</h1>
    </div>

    <div class="p-4 space-y-4">
        <!-- Order Summary -->
        <div class="bg-white p-4 rounded-xl shadow-sm">
            <h2 class="font-bold text-gray-800">Total to Pay: <span id="pay-amount" class="text-orange-600">₹0</span></h2>
        </div>

        <!-- Master Code Section -->
        <div id="master-code-box" class="bg-blue-50 p-4 rounded-xl shadow-sm border border-blue-200">
            <h2 class="font-bold text-blue-800 mb-2 text-sm">Prepaid Order?</h2>
            <p class="text-xs text-blue-600 mb-3">Pay on WhatsApp to get your Master Code.</p>
            
            <button id="wp-redirect-btn" class="w-full bg-[#25D366] text-white font-bold py-2 rounded-lg mb-3">
                <i class="fa-brands fa-whatsapp"></i> Get Master Code
            </button>
            
            <input type="text" id="master-code-input" class="w-full border rounded-lg p-2 text-sm text-center font-bold uppercase tracking-widest" placeholder="ENTER MASTER CODE HERE">
        </div>

        <button id="place-order-btn" class="w-full bg-orange-500 text-white font-bold py-3 rounded-xl shadow-lg">Confirm Order</button>
    </div>

    <script type="module">
        import { auth, db, addDoc, collection, query, where, getDocs, doc, updateDoc } from './common/firebase-config.js';

        let cart = JSON.parse(localStorage.getItem('bringo_cart')) || [];
        let total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        document.getElementById('pay-amount').innerText = `₹${total}`;

        // WhatsApp Redirect
        document.getElementById('wp-redirect-btn').addEventListener('click', () => {
            let items = cart.map(i => `${i.title || i.name} (x${i.qty})`).join(', ');
            let msg = `Hello Budget Bazar!\nI want to place an order.\n\n*Products:* ${items}\n*Total:* ₹${total}\n\nPlease provide me the Master Code for checkout.`;
            window.open(`https://wa.me/917872075844?text=${encodeURIComponent(msg)}`, '_blank');
        });

        // Place Order Logic
        document.getElementById('place-order-btn').addEventListener('click', async () => {
            const inputCode = document.getElementById('master-code-input').value.trim().toUpperCase();
            const btn = document.getElementById('place-order-btn');
            
            if(!inputCode) return alert("Please enter the Master Code!");

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;

            try {
                // ১. ডাটাবেস থেকে কোডটি খুঁজুন
                const q = query(collection(db, "master_codes"), where("code", "==", inputCode));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    btn.innerHTML = 'Confirm Order';
                    btn.disabled = false;
                    return alert("Invalid Master Code! Please check again.");
                }

                const codeDoc = querySnapshot.docs[0];
                const codeData = codeDoc.data();

                // ২. চেক করুন কোডটি আগে ব্যবহার হয়েছে কি না
                if (codeData.is_used) {
                    btn.innerHTML = 'Confirm Order';
                    btn.disabled = false;
                    return alert("This Master Code has already been used!");
                }

                // ৩. কোড সঠিক হলে অর্ডার প্লেস করুন
                await addDoc(collection(db, 'orders'), {
                    user_id: auth.currentUser.uid,
                    total_amount: total,
                    items: cart,
                    payment_method: 'prepaid',
                    used_master_code: inputCode,
                    status: 'Placed',
                    created_at: new Date()
                });

                // ৪. অর্ডার প্লেস হয়ে গেলে কোডটিকে 'Used' হিসেবে মার্ক করুন
                await updateDoc(doc(db, "master_codes", codeDoc.id), {
                    is_used: true,
                    used_by: auth.currentUser.uid,
                    used_at: new Date()
                });

                localStorage.removeItem('bringo_cart');
                alert("Order Placed Successfully!");
                window.location.href = 'order.html';

            } catch (e) {
                alert("Error: " + e.message);
                btn.innerHTML = 'Confirm Order';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
