<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bringo - Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 select-none pb-20">
    <div class="bg-orange-500 text-white p-4 sticky top-0 z-40 shadow-md flex items-center justify-between">
        <div class="flex items-center">
            <a href="index.html" class="mr-4"><i class="fa-solid fa-arrow-left text-xl"></i></a>
            <h1 class="text-xl font-bold" id="page-title">All Products</h1>
        </div>
        <button class="text-white"><i class="fa-solid fa-filter text-xl"></i></button>
    </div>

    <div class="p-4">
        <!-- Products Grid -->
        <div class="grid grid-cols-2 gap-3" id="product-grid">
            <div class="text-center col-span-2 text-orange-500 mt-10">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl"></i>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 w-full bg-white border-t flex justify-around items-center h-16 z-50">
        <a href="index.html" class="text-gray-400 hover:text-orange-500"><i class="fa-solid fa-house text-xl"></i></a>
        <a href="cart.html" class="text-gray-400 hover:text-orange-500"><i class="fa-solid fa-cart-shopping text-xl"></i></a>
        <a href="order.html" class="text-gray-400 hover:text-orange-500"><i class="fa-solid fa-box-open text-xl"></i></a>
        <a href="profile.html" class="text-gray-400 hover:text-orange-500"><i class="fa-solid fa-user text-xl"></i></a>
    </div>

    <script type="module">
        import { db, collection, getDocs, query, where } from './common/firebase-config.js';
        import './common/security.js';

        const urlParams = new URLSearchParams(window.location.search);
        const catId = urlParams.get('category');
        
        if(catId) document.getElementById('page-title').innerText = catId;

        async function loadProducts() {
            const grid = document.getElementById('product-grid');
            let q = collection(db, "products");
            
            // If category filter is applied (assuming you pass category name for simplicity)
            if(catId) q = query(collection(db, "products"), where("category", "==", catId));
            
            const querySnapshot = await getDocs(q);
            grid.innerHTML = '';
            
            if(querySnapshot.empty) {
                grid.innerHTML = `<div class="col-span-2 text-center text-gray-500 mt-10">No products found.</div>`;
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const badge = data.payment_type === 'Prepaid' ? '<span class="absolute top-2 left-2 bg-yellow-400 text-gray-800 text-[10px] font-bold px-2 py-0.5 rounded-md shadow-sm">Prepaid Only</span>' : '';
                
                grid.innerHTML += `
                    <a href="product_detail.html?id=${docSnap.id}" class="bg-white rounded-xl shadow-sm p-3 relative flex flex-col justify-between block hover:shadow-md transition">
                        ${badge}
                        <img src="${data.image_url}" class="w-full h-28 object-contain mb-2 rounded bg-gray-50">
                        <div>
                            <h3 class="text-sm font-bold text-gray-800 leading-tight truncate-2-lines">${data.name}</h3>
                            <p class="text-orange-600 font-bold text-sm mt-1">₹${data.price}</p>
                        </div>
                        <button onclick="event.preventDefault(); alert('Added to cart');" class="mt-2 w-full bg-orange-100 text-orange-600 hover:bg-orange-500 hover:text-white transition rounded-lg py-1.5 text-sm font-bold flex justify-center items-center gap-2">
                            <i class="fa-solid fa-plus"></i> Add
                        </button>
                    </a>`;
            });
        }
        loadProducts();
    </script>
</body>
</html>
