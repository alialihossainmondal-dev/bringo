<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bringo - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 select-none pb-20">
    <!-- Header -->
    <div class="bg-orange-500 text-white p-4 sticky top-0 z-40 rounded-b-2xl shadow-md">
        <div class="flex justify-between items-center mb-3">
            <h1 class="text-2xl font-bold"><i class="fa-solid fa-bag-shopping text-yellow-300 mr-2"></i>Bringo</h1>
            <a href="login.html" id="user-pfp-link">
                <img src="https://ui-avatars.com/api/?name=Login&background=f97316&color=fff" id="user-pfp" class="w-9 h-9 rounded-full border-2 border-yellow-300 shadow-sm">
            </a>
        </div>
        <div class="relative">
            <!-- NEW: Added ID to Search Box -->
            <input type="text" id="search-box" placeholder="Search products or categories..." class="w-full py-2 pl-10 pr-4 rounded-xl text-gray-800 text-sm focus:outline-none shadow-inner border-2 border-transparent focus:border-yellow-300 transition-colors">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-gray-400"></i>
        </div>
    </div>

    <!-- Banner Slider -->
    <div class="p-4 pb-0">
        <div id="banner-slider" class="relative w-full aspect-[16/9] bg-gray-200 rounded-xl overflow-hidden shadow-sm">
            <div class="absolute inset-0 flex items-center justify-center">
                <i class="fa-solid fa-spinner fa-spin text-orange-500 text-2xl"></i>
            </div>
        </div>
    </div>

    <div class="p-4">
        <!-- Categories -->
        <h2 class="font-bold text-gray-800 mb-3 uppercase text-sm tracking-wide">Categories</h2>
        <div class="flex overflow-x-auto gap-4 no-scrollbar mb-6 pb-2" id="category-list"></div>

        <!-- Featured Products -->
        <div class="flex justify-between items-center mb-3">
            <h2 class="font-bold text-gray-800 uppercase text-sm tracking-wide" id="product-section-title">Featured Items</h2>
            <a href="product.html" class="text-xs text-orange-500 font-bold hidden">See All</a>
        </div>
        
        <!-- Product List -->
        <div class="grid grid-cols-2 gap-3" id="product-list">
            <div class="bg-white rounded-xl shadow-sm p-3 animate-pulse h-48"></div>
            <div class="bg-white rounded-xl shadow-sm p-3 animate-pulse h-48"></div>
        </div>
    </div>

    <!-- Floating Instagram Help Button -->
    <a href="https://www.instagram.com/shopbringo?igsh=MWU2c2xjazJteDc3Yg==" target="_blank" class="fixed bottom-20 right-4 w-12 h-12 bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-600 rounded-full flex items-center justify-center shadow-lg z-50 hover:scale-110 transition-transform border-2 border-white">
        <i class="fa-brands fa-instagram text-white text-2xl"></i>
    </a>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around items-center h-16 z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <a href="index.html" class="flex flex-col items-center text-orange-500"><i class="fa-solid fa-house text-xl"></i></a>
        <a href="cart.html" class="flex flex-col items-center text-gray-400 hover:text-orange-500 relative">
            <i class="fa-solid fa-cart-shopping text-xl"></i>
            <span id="cart-badge" class="absolute -top-1 -right-2 bg-yellow-400 text-gray-800 text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
        </a>
        <a href="order.html" class="flex flex-col items-center text-gray-400 hover:text-orange-500"><i class="fa-solid fa-box-open text-xl"></i></a>
        <a href="profile.html" class="flex flex-col items-center text-gray-400 hover:text-orange-500"><i class="fa-solid fa-user text-xl"></i></a>
    </div>

    <script type="module">
        import { db, collection, getDocs, auth, onAuthStateChanged } from './common/firebase-config.js';

        // গ্লোবাল ভেরিয়েবল যেখানে সব প্রোডাক্ট সেভ থাকবে
        let allProducts = [];

        onAuthStateChanged(auth, (user) => {
            const pfpLink = document.getElementById('user-pfp-link');
            const pfpImg = document.getElementById('user-pfp');
            if (user) {
                pfpLink.href = 'profile.html';
                if(user.photoURL) pfpImg.src = user.photoURL;
            }
        });

        function updateCartBadge() {
            let cart = JSON.parse(localStorage.getItem('bringo_cart')) || [];
            const badge = document.getElementById('cart-badge');
            if(cart.length > 0) {
                badge.classList.remove('hidden');
                badge.innerText = cart.length;
            } else {
                badge.classList.add('hidden');
            }
        }
        updateCartBadge();

        async function loadBanners() {
            const slider = document.getElementById('banner-slider');
            const snap = await getDocs(collection(db, "banners"));
            let bannersHTML = '';
            let count = 0;
            snap.forEach(doc => {
                let hiddenClass = count === 0 ? 'opacity-100' : 'opacity-0';
                bannersHTML += `<img src="${doc.data().image_url}" class="absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 ${hiddenClass} banner-slide">`;
                count++;
            });
            if(count > 0) {
                slider.innerHTML = bannersHTML;
                let current = 0;
                const slides = document.querySelectorAll('.banner-slide');
                if(slides.length > 1) {
                    setInterval(() => {
                        slides[current].classList.remove('opacity-100');
                        slides[current].classList.add('opacity-0');
                        current = (current + 1) % slides.length;
                        slides[current].classList.remove('opacity-0');
                        slides[current].classList.add('opacity-100');
                    }, 3000); 
                }
            } else {
                slider.innerHTML = `<div class="absolute inset-0 flex items-center justify-center text-gray-400 text-sm font-bold bg-gray-100">No Banners</div>`;
            }
        }

        async function loadCategories() {
            const list = document.getElementById('category-list');
            const snap = await getDocs(collection(db, "categories"));
            list.innerHTML = '';
            snap.forEach((doc) => {
                const data = doc.data();
                list.innerHTML += `
                    <div class="text-center min-w-[70px] cursor-pointer hover:opacity-80 transition-opacity" onclick="filterByCategory('${data.name}')">
                        <img src="${data.image_url}" class="w-16 h-16 rounded-full mx-auto mb-1 border-2 border-orange-100 object-cover shadow-sm">
                        <p class="text-xs text-gray-700 font-medium">${data.name}</p>
                    </div>`;
            });
        }

        // প্রোডাক্ট ফায়ারবেস থেকে একবারই আনবে
        async function fetchProducts() {
            const snap = await getDocs(collection(db, "products"));
            allProducts = []; // অ্যারে ক্লিয়ার করা হলো
            snap.forEach((doc) => {
                const data = doc.data();
                data.id = doc.id; // আইডি যুক্ত করা হলো
                allProducts.push(data);
            });
            displayProducts(allProducts); // সব প্রোডাক্ট দেখাবে
        }

        // প্রোডাক্ট স্ক্রিনে দেখানোর ফাংশন
        function displayProducts(productsToDisplay) {
            const list = document.getElementById('product-list');
            list.innerHTML = '';

            if (productsToDisplay.length === 0) {
                list.innerHTML = `
                    <div class="col-span-2 text-center py-10 text-gray-400">
                        <i class="fa-solid fa-box-open text-4xl mb-3 text-gray-300"></i>
                        <p class="font-bold">No products found!</p>
                        <p class="text-xs mt-1">Try searching with a different keyword.</p>
                    </div>`;
                return;
            }

            productsToDisplay.forEach((data) => {
                const badge = data.payment_type === 'Prepaid' ? '<span class="absolute top-2 left-2 bg-yellow-400 text-gray-800 text-[10px] font-bold px-2 py-0.5 rounded-md shadow">Prepaid Only</span>' : '';
                const safeName = data.name.replace(/'/g, "\\'");
                
                list.innerHTML += `
                    <a href="product_detail.html?id=${data.id}" class="bg-white rounded-xl shadow-sm p-3 relative flex flex-col justify-between block hover:shadow-md transition">
                        ${badge}
                        <img src="${data.image_url}" class="w-full h-24 object-contain mb-2 rounded">
                        <div>
                            <span class="text-[9px] font-bold text-orange-500 uppercase tracking-wider">${data.category || ''}</span>
                            <h3 class="text-sm font-bold text-gray-800 leading-tight truncate">${data.name}</h3>
                            <p class="text-orange-600 font-bold text-sm mt-1">₹${data.price}</p>
                        </div>
                        <button onclick="event.preventDefault(); window.addToCart('${data.id}', '${safeName}', ${data.price}, '${data.image_url}', '${data.payment_type}')" class="mt-2 w-full bg-orange-100 text-orange-600 hover:bg-orange-500 hover:text-white transition rounded-lg py-1.5 text-sm font-bold flex justify-center items-center gap-2">
                            <i class="fa-solid fa-plus"></i> Add
                        </button>
                    </a>`;
            });
        }

        // NEW: লাইভ সার্চ লজিক
        document.getElementById('search-box').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase().trim();
            const sectionTitle = document.getElementById('product-section-title');
            
            if (searchTerm === '') {
                sectionTitle.innerText = "Featured Items";
                displayProducts(allProducts);
            } else {
                sectionTitle.innerText = `Search Results for "${searchTerm}"`;
                // নাম অথবা ক্যাটাগরি দিয়ে ফিল্টার করবে
                const filtered = allProducts.filter(product => 
                    product.name.toLowerCase().includes(searchTerm) || 
                    (product.category && product.category.toLowerCase().includes(searchTerm))
                );
                displayProducts(filtered);
            }
        });

        // NEW: ক্যাটাগরিতে ক্লিক করলে ফিল্টার হবে
        window.filterByCategory = (categoryName) => {
            const sectionTitle = document.getElementById('product-section-title');
            sectionTitle.innerText = `${categoryName} Products`;
            const filtered = allProducts.filter(product => product.category === categoryName);
            displayProducts(filtered);
            
            // স্ক্রল করে প্রোডাক্ট লিস্টের কাছে নিয়ে যাবে
            document.getElementById('product-section-title').scrollIntoView({ behavior: 'smooth', block: 'start' });
        };

        window.addToCart = (id, name, price, image, type) => {
            let cart = JSON.parse(localStorage.getItem('bringo_cart')) || [];
            let existing = cart.find(item => item.id === id);
            
            if(existing) {
                existing.qty += 1;
            } else {
                cart.push({ id, name, price, image, type, qty: 1 });
            }
            
            localStorage.setItem('bringo_cart', JSON.stringify(cart));
            updateCartBadge();
            
            const btn = event.currentTarget;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Added';
            btn.classList.replace('bg-orange-100', 'bg-green-500');
            btn.classList.replace('text-orange-600', 'text-white');
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.classList.replace('bg-green-500', 'bg-orange-100');
                btn.classList.replace('text-white', 'text-orange-600');
            }, 1000);
        };

        loadBanners();
        loadCategories();
        fetchProducts(); // এখানে আপডেট করা ফাংশন কল করা হলো
    </script>
</body>
</html>
